site_name: Dream
site_url: https://sps014.github.io/Dream/
repo_url: https://github.com/sps014/Dream
repo_name: sps014/Dream

theme:
  name: material
  font:
    text: Inter
    code: JetBrains Mono
  palette:
    scheme: slate
    primary: black
    accent: deep-purple
  features:
    - content.action.edit
    - content.action.view
    - content.code.annotate
    - content.code.copy
    - content.code.select
    - content.tabs.link
    - content.tooltips
    - navigation.footer
    - navigation.indexes
    - navigation.instant
    - navigation.instant.progress
    - navigation.path
    - navigation.sections
    - navigation.top
    - navigation.tracking
    - navigation.expand
    - toc.follow

hooks:
  - tooling/docs/dream_lexer.py

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets:
      dedent_subsections: true
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - tables
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - Basics:
    - Variables: language/variables.md
    - Operators: language/operators.md
    - Control Flow: language/control-flow.md
    - Functions: language/functions.md
  - Types & Data:
    - Primitives: language/primitives.md
    - Arrays: language/arrays.md
    - Enums & Unions: language/enums-unions.md
    - Classes & Structs: language/classes-structs.md
    - The object Type: language/objects.md
  - Advanced Features:
    - Generics: language/generics.md
    - Interfaces: language/interfaces.md
    - Async/Await: language/async.md
    - Imports & Modules: language/imports.md
    - Memory Management: language/memory.md
    - Interop:
      - Overview: language/interop.md
      - JS References: language/references.md
      - Callbacks: language/callbacks.md
  - Standard Library:
    - Built-ins: stdlib/builtins.md
    - Strings: stdlib/string.md
    - Option & Result: stdlib/option-result.md
    - Collections (List & Map): stdlib/collections.md
    - System & IO:
      - JSON: stdlib/json.md
      - File I/O: stdlib/file.md
      - HTTP: stdlib/http.md
      - Regex: stdlib/regex.md
      - DateTime: stdlib/datetime.md